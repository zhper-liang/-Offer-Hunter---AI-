[project]
name = "backend"
description = "Personal Job Assistant Backend"

[phases.setup]
# Python 3.11 已内置，无需额外依赖
only = ["python"]

[phases.install]
nixpkgs = ["python311", "pip"]
cmd = ["python", "-m", "pip", "install", "--no-cache-dir", "-r", "requirements.txt"]

[phases.start]
cmd = ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "{{PORT}}"]

[start]
port = 8000